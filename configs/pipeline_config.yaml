  scenario_id: clean_baseline
  split_id: train
  random_seed: 1729
  timezone: UTC
  start_time_utc: '2025-06-01T00:00:00Z'
  duration_hours: 24
  shape_resolution_seconds: 60
  simulation_resolution_seconds: 1
  feeder_head_line: l115
  selected_lines:
